name: circle-plugins
version: 0.1.0
description: >
  Circle Plugins for Hermes: developer-controlled wallets, USDC transfers,
  gas-free x402 nanopayments, testnet faucet funding, and payment requests.
  Arc Testnet by default.
author: Circle
kind: backend
provides_tools:
  - circle_create_wallet
  - circle_check_balance
  - circle_faucet_info
  - circle_request_faucet
  - circle_send_usdc
  - circle_request_usdc
  - circle_pay_x402
  - circle_gateway_deposit
  - circle_gateway_balance
  - circle_execute_contract
  - circle_bridge_usdc
  - circle_swap_quote
  - circle_swap
  - circle_services_search
  - circle_services_inspect
provides_hooks:
  - post_tool_call
requires_env:
  - name: CIRCLE_API_KEY
    description: "Circle API key (format PREFIX:ID:SECRET) from console.circle.com"
    url: "https://console.circle.com"
    secret: true
  - name: ENTITY_SECRET
    description: "32-byte hex entity secret you generate and register yourself"
    url: "https://developers.circle.com/wallets/dev-controlled/register-entity-secret"
    secret: true
optional_env:
  - name: CIRCLE_NETWORK
    description: "TESTNET (default) or MAINNET"
  - name: CIRCLE_DEFAULT_CHAIN
    description: "Default chain id, e.g. ARC-TESTNET"
  - name: CIRCLE_WALLET_SET_ID
    description: "Reuse an existing wallet set instead of creating one"
  - name: X402_PRIVATE_KEY
    description: "Buyer key for x402 nanopayments"
    secret: true
  - name: CIRCLE_KIT_KEY
    description: "Circle App Kit key for SDK-native swaps"
    secret: true
